<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>歷史記錄 — 水杯追蹤器</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
  <div class="page-title">📊 飲水歷史</div>

  <!-- 月份導航 -->
  <div class="month-nav">
    <button id="btn-prev">&#8249;</button>
    <span class="month-label" id="month-label">--</span>
    <button id="btn-next">&#8250;</button>
  </div>

  <!-- 每日飲水量 -->
  <div class="card">
    <div class="label" style="margin-bottom:10px">每日飲水量</div>
    <div class="chart-wrap"><canvas id="daily-chart" height="180"></canvas></div>
    <div id="daily-empty" class="empty-state" style="display:none">本月無飲水記錄</div>
  </div>

  <!-- 月統計摘要（6 格） -->
  <div class="stats-grid">
    <div class="stat-cell">
      <div class="label">本月總量</div>
      <div class="num-lg" id="s-total">--</div>
    </div>
    <div class="stat-cell">
      <div class="label">達標天數</div>
      <div class="num-lg" id="s-days">--</div>
      <div class="sub">有記錄天數</div>
    </div>
    <div class="stat-cell">
      <div class="label">平均每日</div>
      <div class="num-lg" id="s-avg">--</div>
    </div>
    <div class="stat-cell">
      <div class="label">最高單日</div>
      <div class="num-lg" id="s-max">--</div>
    </div>
    <div class="stat-cell">
      <div class="label">連續達標</div>
      <div class="num-lg" id="s-streak">--</div>
      <div class="sub">最長天數</div>
    </div>
    <div class="stat-cell">
      <div class="label">平均每次</div>
      <div class="num-lg" id="s-per">--</div>
    </div>
  </div>

  <!-- 深度分析 -->
  <div class="card">
    <div class="label" style="margin-bottom:12px">深度分析</div>
    <div class="stats-grid">
      <div class="stat-cell">
        <div class="label">最活躍時段</div>
        <div class="num-sm" id="a-peak">--</div>
      </div>
      <div class="stat-cell">
        <div class="label">本月次數</div>
        <div class="num-sm" id="a-count">--</div>
      </div>
      <div class="stat-cell">
        <div class="label">最長空窗</div>
        <div class="num-sm" id="a-gap">--</div>
      </div>
      <div class="stat-cell">
        <div class="label">最活躍日</div>
        <div class="num-sm" id="a-day">--</div>
      </div>
    </div>
  </div>

  <!-- 時段分布 -->
  <div class="card">
    <div class="label" style="margin-bottom:10px">時段分布（飲水次數）</div>
    <div class="chart-wrap"><canvas id="hour-chart" height="120"></canvas></div>
    <div id="hour-empty" class="empty-state" style="display:none">無時間同步記錄</div>
  </div>

  <!-- 週別飲水量 -->
  <div class="card">
    <div class="label" style="margin-bottom:10px">週別飲水量（日平均）</div>
    <div class="chart-wrap"><canvas id="week-chart" height="140"></canvas></div>
    <div id="week-empty" class="empty-state" style="display:none">本月無飲水記錄</div>
  </div>

  <!-- 詳細記錄（預設收合） -->
  <div class="card">
    <button class="log-toggle" id="log-toggle" onclick="toggleLog()">
      ▶ 詳細記錄 <span id="log-count"></span>
    </button>
    <div id="log-section" style="display:none;margin-top:10px">
      <div class="page-size-row">
        每頁
        <button class="ps-btn active" data-ps="10" onclick="setPageSize(10)">10</button>
        <button class="ps-btn" data-ps="20" onclick="setPageSize(20)">20</button>
        <button class="ps-btn" data-ps="50" onclick="setPageSize(50)">50</button>
        筆
      </div>
      <div id="log-empty" class="empty-state" style="display:none">本月無飲水記錄</div>
      <div style="overflow-x:auto">
        <table class="log-table" id="log-table" style="display:none">
          <thead><tr>
            <th>時間</th><th>飲水量</th><th>當日累計</th>
          </tr></thead>
          <tbody id="log-body"></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination" style="display:none">
        <button id="pg-prev" onclick="goPage(-1)">&#8249;</button>
        <span id="pg-info"></span>
        <button id="pg-next" onclick="goPage(1)">&#8250;</button>
      </div>
    </div>
  </div>
</div>

<nav>
  <a href="/"><span class="ni">🏠</span>首頁</a>
  <a href="/history" class="active"><span class="ni">📊</span>歷史</a>
  <a href="/settings"><span class="ni">⚙️</span>設定</a>
</nav>

<script>
const now = new Date();
let curYear  = now.getFullYear();
let curMonth = now.getMonth() + 1;
let dailyGoal = 2000;
let _cachedEntries = [];
let _logSorted = [];
let _logPage = 1;
let _logPageSize = 10;
let _logExpanded = false;
let _fetchSeq = 0;

fetch('/api/config').then(r => r.json()).then(d => {
  if (d.ok && d.dailyGoalMl > 0 && d.dailyGoalMl < 50000) dailyGoal = d.dailyGoalMl;
  render();
}).catch(() => render());

// ─── Helpers ───────────────────────────────────────────────────────────────

function monthStr(y, m) { return y + '-' + String(m).padStart(2, '0'); }
function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
function fmtTs(ts) {
  if (!ts) return '時間未同步';
  const d = new Date(ts);
  if (isNaN(d.getTime())) return '時間未同步';
  return (d.getMonth()+1) + '/' + d.getDate() + ' ' +
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function tsMs(e) { const t = e.ts ? new Date(e.ts).getTime() : NaN; return isNaN(t) ? 0 : t; }

function aggregateByDay(entries, y, m) {
  const totals = new Array(daysInMonth(y, m)).fill(0);
  for (const e of entries) {
    if (!e.ts) continue;
    const d = new Date(e.ts);
    if (isNaN(d.getTime())) continue;
    if (d.getFullYear() !== y || d.getMonth() + 1 !== m) continue;
    const i = d.getDate() - 1;
    if (e.total > totals[i]) totals[i] = e.total;
  }
  return totals;
}

function aggregateByHourBand(entries) {
  const bands  = [0, 0, 0, 0, 0, 0];
  const labels = ['0–4時', '4–8時', '8–12時', '12–16時', '16–20時', '20–24時'];
  for (const e of entries) {
    if (!e.ts) continue;
    const d = new Date(e.ts);
    if (!isNaN(d.getTime())) bands[Math.floor(d.getHours() / 4)]++;
  }
  return { bands, labels };
}

function aggregateByWeekday(dailyTotals, y, m) {
  const wd = Array.from({length: 7}, () => []);
  for (let i = 0; i < dailyTotals.length; i++) {
    if (dailyTotals[i] > 0)
      wd[new Date(y, m - 1, i + 1).getDay()].push(dailyTotals[i]);
  }
  const order  = [1, 2, 3, 4, 5, 6, 0];
  const labels = ['一', '二', '三', '四', '五', '六', '日'];
  const avgs = order.map(i => {
    const arr = wd[i];
    return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0;
  });
  return { avgs, labels };
}

function calcMaxStreak(dailyTotals, goal) {
  let max = 0, cur = 0;
  for (const v of dailyTotals) {
    if (v >= goal) { if (++cur > max) max = cur; } else cur = 0;
  }
  return max;
}

function calcMaxGapHours(entries) {
  const ts = entries
    .filter(e => e.ts && !isNaN(new Date(e.ts).getTime()))
    .map(e => new Date(e.ts).getTime())
    .sort((a, b) => a - b);
  if (ts.length < 2) return 0;
  let max = 0;
  for (let i = 1; i < ts.length; i++) max = Math.max(max, ts[i] - ts[i - 1]);
  return max / 3600000;
}

function bestDrinkDay(entries) {
  const counts = {};
  for (const e of entries) {
    if (!e.ts) continue;
    const d = new Date(e.ts);
    if (isNaN(d.getTime())) continue;
    const k = (d.getMonth()+1) + '/' + d.getDate();
    counts[k] = (counts[k] || 0) + 1;
  }
  let best = '--', max = 0;
  for (const [k, v] of Object.entries(counts))
    if (v > max) { max = v; best = k + '（' + v + '次）'; }
  return best;
}

// ─── Canvas Charts ──────────────────────────────────────────────────────────

function dpr() { return window.devicePixelRatio || 1; }

function setupCanvas(canvas) {
  const r = dpr();
  const w = canvas.parentElement.clientWidth || 300;
  const h = canvas.height || 180;
  canvas.width  = w * r;
  canvas.height = h * r;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(r, r);
  return { ctx, w, h: canvas.height / r };
}

function drawDailyChart(canvas, dailyTotals, goal) {
  const { ctx, w, h } = setupCanvas(canvas);
  const pad = { t: 12, r: 8, b: 30, l: 40 };
  const cw = w - pad.l - pad.r;
  const ch = h - pad.t - pad.b;
  const n = dailyTotals.length;
  const maxVal = Math.max(goal, ...dailyTotals, 1);
  const barW = Math.max(2, (cw / n) - 2);
  const gap  = (cw - barW * n) / (n - 1 || 1);
  ctx.clearRect(0, 0, w, h);

  const gy = pad.t + ch * (1 - goal / maxVal);
  ctx.strokeStyle = 'rgba(0,255,136,0.3)';
  ctx.setLineDash([4, 4]);
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad.l, gy); ctx.lineTo(pad.l + cw, gy); ctx.stroke();
  ctx.setLineDash([]);

  dailyTotals.forEach((v, i) => {
    const x  = pad.l + i * (barW + gap);
    const bh = v > 0 ? Math.max(2, (v / maxVal) * ch) : 2;
    const y  = pad.t + ch - bh;
    ctx.fillStyle = v >= goal ? '#00ff88' : v > 0 ? '#00d4ff' : 'rgba(255,255,255,0.1)';
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(x, y, barW, bh, 3) : ctx.rect(x, y, barW, bh);
    ctx.fill();
  });

  ctx.fillStyle = '#8ca8b8';
  ctx.font = '10px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  for (let i = 0; i < n; i++) {
    if (i === 0 || (i + 1) % 5 === 0) {
      ctx.fillText(i + 1, pad.l + i * (barW + gap) + barW / 2, h - pad.b + 14);
    }
  }
  ctx.textAlign = 'right';
  [0, 0.5, 1].forEach(f => {
    const v = Math.round(maxVal * f);
    ctx.fillText(v >= 1000 ? (v/1000).toFixed(1) + 'k' : v,
                 pad.l - 4, pad.t + ch * (1 - f) + 3);
  });
}

function drawHourChart(canvas, bands, labels) {
  const { ctx, w, h } = setupCanvas(canvas);
  const pad = { t: 8, r: 50, b: 8, l: 62 };
  const cw = w - pad.l - pad.r;
  const ch = h - pad.t - pad.b;
  const n = bands.length;
  const maxVal = Math.max(...bands, 1);
  const barH = Math.max(2, ch / n - 4);
  const gap  = (ch - barH * n) / (n - 1 || 1);
  ctx.clearRect(0, 0, w, h);
  ctx.font = '10px -apple-system, sans-serif';

  bands.forEach((v, i) => {
    const y  = pad.t + i * (barH + gap);
    const bw = v > 0 ? Math.max(2, (v / maxVal) * cw) : 2;
    ctx.fillStyle = '#8ca8b8';
    ctx.textAlign = 'right';
    ctx.fillText(labels[i], pad.l - 5, y + barH / 2 + 4);
    ctx.fillStyle = v > 0 ? '#00d4ff' : 'rgba(255,255,255,0.1)';
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(pad.l, y, bw, barH, 3) : ctx.rect(pad.l, y, bw, barH);
    ctx.fill();
    ctx.fillStyle = '#8ca8b8';
    ctx.textAlign = 'left';
    ctx.fillText(v + ' 次', pad.l + bw + 5, y + barH / 2 + 4);
  });
}

function drawWeekChart(canvas, avgs, labels, goal) {
  const { ctx, w, h } = setupCanvas(canvas);
  const pad = { t: 12, r: 8, b: 28, l: 36 };
  const cw = w - pad.l - pad.r;
  const ch = h - pad.t - pad.b;
  const n = labels.length;
  const maxVal = Math.max(goal, ...avgs, 1);
  const barW = Math.max(4, (cw / n) - 4);
  const gap  = (cw - barW * n) / (n - 1 || 1);
  ctx.clearRect(0, 0, w, h);

  const gy = pad.t + ch * (1 - goal / maxVal);
  ctx.strokeStyle = 'rgba(0,255,136,0.25)';
  ctx.setLineDash([4, 4]);
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad.l, gy); ctx.lineTo(pad.l + cw, gy); ctx.stroke();
  ctx.setLineDash([]);

  avgs.forEach((v, i) => {
    const x  = pad.l + i * (barW + gap);
    const bh = v > 0 ? Math.max(2, (v / maxVal) * ch) : 2;
    const y  = pad.t + ch - bh;
    ctx.fillStyle = v >= goal ? '#00ff88' : v > 0 ? 'rgba(0,212,255,0.75)' : 'rgba(255,255,255,0.08)';
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(x, y, barW, bh, 3) : ctx.rect(x, y, barW, bh);
    ctx.fill();
  });

  ctx.fillStyle = '#8ca8b8';
  ctx.font = '11px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  labels.forEach((l, i) => {
    ctx.fillText(l, pad.l + i * (barW + gap) + barW / 2, h - pad.b + 14);
  });

  ctx.textAlign = 'right';
  [0, 0.5, 1].forEach(f => {
    const v = Math.round(maxVal * f);
    ctx.fillText(v >= 1000 ? (v/1000).toFixed(1) + 'k' : v,
                 pad.l - 4, pad.t + ch * (1 - f) + 3);
  });
}

// ─── Log Table ──────────────────────────────────────────────────────────────

function toggleLog() {
  _logExpanded = !_logExpanded;
  document.getElementById('log-section').style.display = _logExpanded ? '' : 'none';
  updateToggle();
}

function setPageSize(n) {
  _logPageSize = n;
  _logPage = 1;
  document.querySelectorAll('.ps-btn').forEach(b => {
    b.classList.toggle('active', +b.dataset.ps === n);
  });
  renderLogPage();
}

function goPage(delta) {
  const pages = Math.ceil(_logSorted.length / _logPageSize) || 1;
  _logPage = Math.max(1, Math.min(pages, _logPage + delta));
  renderLogPage();
}

function renderLogPage() {
  const total = _logSorted.length;
  const pages = Math.ceil(total / _logPageSize) || 1;
  const start = (_logPage - 1) * _logPageSize;
  const show  = _logSorted.slice(start, start + _logPageSize);

  document.getElementById('log-empty').style.display  = total === 0 ? '' : 'none';
  document.getElementById('log-table').style.display  = total > 0  ? '' : 'none';
  document.getElementById('pagination').style.display = total > _logPageSize ? '' : 'none';

  if (total > 0) {
    const tbody = document.getElementById('log-body');
    tbody.innerHTML = '';
    show.forEach(e => {
      const tr = document.createElement('tr');
      tr.innerHTML = '<td>' + fmtTs(e.ts) + '</td>' +
        '<td><strong>' + Math.round(e.ml || 0) + ' ml</strong></td>' +
        '<td><strong>' + Math.round(e.total || 0) + ' ml</strong></td>';
      tbody.appendChild(tr);
    });
    document.getElementById('pg-info').textContent =
      '第 ' + _logPage + ' / ' + pages + ' 頁（共 ' + total + ' 筆）';
    document.getElementById('pg-prev').disabled = _logPage <= 1;
    document.getElementById('pg-next').disabled = _logPage >= pages;
  }
}

function updateToggle() {
  const btn = document.getElementById('log-toggle');
  const n   = _logSorted.length;
  btn.textContent = (_logExpanded ? '▼' : '▶') + ' 詳細記錄 ';
  const sp = document.createElement('span');
  sp.id = 'log-count';
  sp.textContent = n > 0 ? '（' + n + ' 筆）' : '';
  btn.appendChild(sp);
}

// ─── Main Render ───────────────────────────────────────────────────────────

function render() {
  const seq = ++_fetchSeq;
  const month = monthStr(curYear, curMonth);
  document.getElementById('month-label').textContent =
    curYear + ' 年 ' + String(curMonth).padStart(2, '0') + ' 月';
  const todayY = now.getFullYear(), todayM = now.getMonth() + 1;
  document.getElementById('btn-next').disabled =
    curYear > todayY || (curYear === todayY && curMonth >= todayM);

  fetch('/api/logs?month=' + month)
    .then(r => r.json())
    .then(j => {
      if (seq !== _fetchSeq) return;
      if (!j.ok) { renderEmpty('API 錯誤：' + (j.error || '未知')); return; }
      renderData(Array.isArray(j.entries) ? j.entries : []);
    })
    .catch(() => { if (seq === _fetchSeq) renderEmpty('連線失敗'); });
}

function renderEmpty(msg) {
  ['daily-empty','hour-empty','week-empty','log-empty'].forEach(id => {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = '';
  });
  ['daily-chart','hour-chart','week-chart','log-table','pagination'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  ['s-total','s-days','s-avg','s-max','s-streak','s-per',
   'a-peak','a-count','a-gap','a-day'].forEach(id => {
    document.getElementById(id).textContent = '--';
  });
  _logSorted = [];
  updateToggle();
}

function renderData(entries) {
  _cachedEntries = entries;

  // Daily chart
  const dailyTotals = aggregateByDay(entries, curYear, curMonth);
  const hasData = dailyTotals.some(v => v > 0);
  document.getElementById('daily-chart').style.display = hasData ? '' : 'none';
  document.getElementById('daily-empty').style.display = hasData ? 'none' : '';
  if (hasData) drawDailyChart(document.getElementById('daily-chart'), dailyTotals, dailyGoal);

  // Stats (6 cells)
  const recorded  = dailyTotals.filter(v => v > 0);
  const monthTotal = recorded.reduce((a, b) => a + b, 0);
  const goalDays   = recorded.filter(v => v >= dailyGoal).length;
  const avgDay     = recorded.length ? Math.round(monthTotal / recorded.length) : 0;
  const maxDay     = recorded.length ? Math.round(Math.max(...recorded)) : 0;
  const streak     = calcMaxStreak(dailyTotals, dailyGoal);
  const validDrinks = entries.filter(e => e.ml > 0);
  const avgPer      = validDrinks.length
    ? Math.round(validDrinks.reduce((a, e) => a + e.ml, 0) / validDrinks.length) : 0;
  document.getElementById('s-total').textContent  = Math.round(monthTotal) + ' ml';
  document.getElementById('s-days').textContent   = goalDays + ' / ' + recorded.length;
  document.getElementById('s-avg').textContent    = avgDay + ' ml';
  document.getElementById('s-max').textContent    = maxDay + ' ml';
  document.getElementById('s-streak').textContent = streak + ' 天';
  document.getElementById('s-per').textContent    = avgPer + ' ml';

  // Deep analysis
  const synced = entries.filter(e => e.ts && !isNaN(new Date(e.ts).getTime()));
  const { bands, labels } = aggregateByHourBand(synced);
  const maxBand = Math.max(...bands);
  const peakBands = maxBand > 0 ? labels.filter((_, i) => bands[i] === maxBand) : [];
  document.getElementById('a-peak').textContent =
    peakBands.length === 0 ? '--' :
    peakBands.length === 1 ? peakBands[0] : peakBands[0] + ' 等';
  document.getElementById('a-count').textContent = entries.length + ' 次';
  const gap = calcMaxGapHours(synced);
  document.getElementById('a-gap').textContent   = gap > 0 ? gap.toFixed(1) + ' 小時' : '--';
  document.getElementById('a-day').textContent   = bestDrinkDay(synced);

  // Hourly chart
  const hasHour = bands.some(v => v > 0);
  document.getElementById('hour-chart').style.display = hasHour ? '' : 'none';
  document.getElementById('hour-empty').style.display = hasHour ? 'none' : '';
  if (hasHour) drawHourChart(document.getElementById('hour-chart'), bands, labels);

  // Weekday chart
  const { avgs, labels: wl } = aggregateByWeekday(dailyTotals, curYear, curMonth);
  const hasWeek = avgs.some(v => v > 0);
  document.getElementById('week-chart').style.display = hasWeek ? '' : 'none';
  document.getElementById('week-empty').style.display = hasWeek ? 'none' : '';
  if (hasWeek) drawWeekChart(document.getElementById('week-chart'), avgs, wl, dailyGoal);

  // Log table
  _logSorted = entries.slice().sort((a, b) => tsMs(b) - tsMs(a));
  _logPage = 1;
  renderLogPage();
  updateToggle();
}

// Navigation
document.getElementById('btn-prev').addEventListener('click', () => {
  if (--curMonth < 1) { curMonth = 12; curYear--; }
  render();
});
document.getElementById('btn-next').addEventListener('click', () => {
  if (++curMonth > 12) { curMonth = 1; curYear++; }
  render();
});

// Resize (debounced)
let _resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    const dt = aggregateByDay(_cachedEntries, curYear, curMonth);
    const dc = document.getElementById('daily-chart');
    const hc = document.getElementById('hour-chart');
    const wc = document.getElementById('week-chart');
    if (dc.style.display !== 'none') drawDailyChart(dc, dt, dailyGoal);
    if (hc.style.display !== 'none') {
      const synced = _cachedEntries.filter(e => e.ts && !isNaN(new Date(e.ts).getTime()));
      const { bands, labels } = aggregateByHourBand(synced);
      drawHourChart(hc, bands, labels);
    }
    if (wc.style.display !== 'none') {
      const { avgs, labels } = aggregateByWeekday(dt, curYear, curMonth);
      drawWeekChart(wc, avgs, labels, dailyGoal);
    }
  }, 150);
});
</script>
</body>
</html>
