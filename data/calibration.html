<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>秤重校正 — Water Tracker</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
  <h1>秤重校正</h1>

  <h2>即時重量</h2>
  <div class="weight-display" id="weight">-- g</div>

  <hr class="divider">

  <h2>步驟 1：歸零（Tare）</h2>
  <p style="font-size:.9em;color:#666">移除所有重物後按下歸零。</p>
  <button class="btn btn-secondary" onclick="doTare()">歸零</button>
  <div id="tare-msg" class="msg" style="display:none"></div>

  <hr class="divider">

  <h2>步驟 2：輸入已知重量</h2>
  <p style="font-size:.9em;color:#666">放上已知重量的砝碼，輸入克數後按下校正。</p>
  <label for="known-weight">已知重量 (g)</label>
  <input type="number" id="known-weight" min="1" max="5000" step="0.1" placeholder="例如 500">
  <button class="btn btn-primary" onclick="doCalibrate()">校正</button>
  <div id="cal-msg" class="msg" style="display:none"></div>

  <hr class="divider">

  <div id="result" style="display:none">
    <h2>校正結果</h2>
    <div id="result-body" style="font-size:.9em;color:#333;line-height:1.8"></div>
  </div>
</div>

<script>
let weightTimer = null;

function setMsg(id, text, ok) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err');
  el.style.display = 'block';
}

async function fetchWeight() {
  try {
    const r = await fetch('/api/weight');
    const d = await r.json();
    if (d.ok) {
      document.getElementById('weight').textContent = d.weight_g.toFixed(1) + ' g';
    }
  } catch (_) {}
}

async function doTare() {
  try {
    const r = await fetch('/api/tare', { method: 'POST' });
    const d = await r.json();
    setMsg('tare-msg', d.ok ? '歸零完成' : ('錯誤：' + d.error), d.ok);
  } catch (e) {
    setMsg('tare-msg', '連線失敗', false);
  }
}

async function doCalibrate() {
  const knownW = parseFloat(document.getElementById('known-weight').value);
  if (!knownW || knownW <= 0) {
    setMsg('cal-msg', '請輸入有效的已知重量', false);
    return;
  }
  try {
    const r = await fetch('/api/calibrate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ known_weight_g: knownW })
    });
    const d = await r.json();
    if (d.ok) {
      setMsg('cal-msg', '校正完成', true);
      const rb = document.getElementById('result-body');
      rb.innerHTML =
        '校正因子：<strong>' + d.calibration_factor.toFixed(4) + '</strong><br>' +
        '當前讀數：<strong>' + d.current_weight_g.toFixed(1) + ' g</strong><br>' +
        '已知重量：<strong>' + knownW.toFixed(1) + ' g</strong><br>' +
        '誤差：<strong>' + Math.abs(d.current_weight_g - knownW).toFixed(1) + ' g</strong>';
      document.getElementById('result').style.display = 'block';
    } else {
      setMsg('cal-msg', '錯誤：' + d.error, false);
    }
  } catch (e) {
    setMsg('cal-msg', '連線失敗', false);
  }
}

// Poll weight every second
fetchWeight();
weightTimer = setInterval(fetchWeight, 1000);
</script>
</body>
</html>
