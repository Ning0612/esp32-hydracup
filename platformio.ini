[env:esp32dev]
platform = espressif32@~6.10.0
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

board_build.filesystem = littlefs
board_build.partitions = partitions.csv
; uploadfs targets the first data/spiffs partition (webfs 0x290000, 384KB)
; logfs (0x2F0000, 1MB) is a separate partition never touched by uploadfs
; Verify with: pio run -v -t uploadfs | grep address

lib_deps =
    bogde/HX711
    bblanchon/ArduinoJson
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
    knolleary/PubSubClient

build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D MQTT_MAX_PACKET_SIZE=512
    -I include
