[env:esp32dev]
platform = espressif32@~6.10.0
board = esp32dev
framework = espidf

monitor_speed = 115200
upload_speed = 921600

board_build.filesystem = littlefs
board_build.partitions = partitions.csv
; uploadfs targets the first data/spiffs partition (webfs 0x290000, 384KB)
; logfs (0x2F0000, 1MB) is a separate partition never touched by uploadfs
; Verify with: pio run -v -t uploadfs | grep address

build_flags =
    -I include
    -Wno-error=misleading-indentation
    -Wno-error=format-truncation
    -Wno-misleading-indentation
    -Wno-format-truncation

[env:native]
platform = native
test_framework = unity
build_flags =
    -std=c++17
